apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-crm
  labels:
    app: backend-crm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-crm
  template:
    metadata:
      labels:
        app: backend-crm
    spec:
      containers:
      - name: backend-crm
        image: asia-northeast1-docker.pkg.dev/erp-project-8386/arsneonci-repo/backend-crm:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: ENV
          value: "development"
        - name: DB_HOST
          value: "postgres-db"
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: erp-db-secrets
              key: DB_PASSWORD
        - name: DB_NAME
          value: "crm_db"
        - name: REDIS_HOST
          value: "redis-cache"
        - name: REDIS_PORT
          value: "6379"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-crm-svc
spec:
  type: ClusterIP
  selector:
    app: backend-crm
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080