apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-orchestrator
  template:
    metadata:
      labels:
        app: ai-orchestrator
    spec:
      containers:
      - name: ai-orchestrator
        image: asia-northeast1-docker.pkg.dev/erp-project-8386/arsneonci-repo/ai-orchestrator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "postgres-db"
        - name: DB_NAME
          value: "ai_orchestrator_db"
        - name: REDIS_HOST
          value: "redis-cache"
        - name: MONGO_HOST
          value: "mongodb-service"

---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator-svc
spec:
  type: ClusterIP
  selector:
    app: ai-orchestrator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000