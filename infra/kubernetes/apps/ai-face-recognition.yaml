apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-face-recognition
  labels:
    app: ai-face-recognition
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-face-recognition
  template:
    metadata:
      labels:
        app: ai-face-recognition
    spec:
      containers:
      - name: ai-face-recognition
        image: asia-northeast1-docker.pkg.dev/erp-project-8386/arsneonci-repo/ai-face-recognition:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: "development"
        - name: DB_HOST
          value: "postgres-db"
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: erp-db-secrets
              key: DB_PASSWORD
        - name: DB_NAME
          value: "facial_recognition_db"
        - name: REDIS_HOST
          value: "redis-cache"
        - name: REDIS_PORT
          value: "6379"

---
apiVersion: v1
kind: Service
metadata:
  name: ai-face-recognition-svc
spec:
  type: ClusterIP
  selector:
    app: ai-face-recognition
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000