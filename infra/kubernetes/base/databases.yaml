# ==========================================
# 1. POSTGRESQL DATABASE
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  labels:
    app: postgres-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg15-trixie


        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: erp-db-secrets
              key: DB_PASSWORD
        - name: POSTGRES_MULTIPLE_DATABASES
          value: "identity_db,inventory_db,purchasing_db,sales_db,crm_db,finance_db,hrm_db"
        volumeMounts:
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d/init-multiple-databases.sh
          subPath: init-multiple-databases.sh
      volumes:
      - name: init-script
        configMap:
          name: postgres-init-script
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db # Trùng khớp với DB_HOST trong docker-compose
spec:
  type: ClusterIP
  selector:
    app: postgres-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432

---
# ==========================================
# 2. REDIS CACHE
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  labels:
    app: redis-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:8.10-rc2-alpine3.23
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cache # Trùng khớp với REDIS_HOST trong docker-compose
spec:
  type: ClusterIP
  selector:
    app: redis-cache
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---

# ==========================================
# 3. MONGO DATABASE
# ==========================================
mongodb-service:
    image: mongo:8.3.4
    profiles: ["infra", "fullstack"]
    container_name: erp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai_logs_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - erp_network