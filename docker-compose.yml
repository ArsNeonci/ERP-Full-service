# ==========================================
# KHAI BÁO NETWORK CHUNG CHO TOÀN BỘ HỆ THỐNG
# ==========================================
networks:
  erp_network:
    driver: bridge

# ==========================================
# KHAI BÁO VOLUMES ĐỂ LƯU TRỮ DỮ LIỆU
# ==========================================
volumes:
  postgres_data:
  redis_data:
  mongo_data:

services:
  # =========================================================
  # [PROFILE: INFRA] - CÁC DỊCH VỤ HẠ TẦNG & DATABASE
  # =========================================================
  postgres-db:
    image: pgvector/pgvector:pg15-trixie


    profiles: ["infra", "fullstack"]
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_password}
      POSTGRES_MULTIPLE_DATABASES: "identity_db,inventory_db,purchasing_db,sales_db,crm_db,finance_db,hrm_db,ai_orchestrator_db,ai_vector_db"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    networks:
      - erp_network



  redis-cache:
    image: redis:8.10-rc2-alpine3.23
    profiles: ["infra", "fullstack"]
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - erp_network

  mongodb-service:
    image: mongo:8.3.4
    profiles: ["infra", "fullstack"]
    container_name: erp-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ai_logs_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - erp_network

  # =========================================================
  # [PROFILE: FULLSTACK] - 11 MICROSERVICES ỨNG DỤNG
  # =========================================================

  # ---------------------------------------------------------
  # 1. MIDDLEWARE
  # ---------------------------------------------------------
  api-gateway:
    build:
      context: ./apps/Middleware/gateway
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-gateway
    restart: unless-stopped
    ports:
      - "8080:8080" # PUBLIC: Cổng duy nhất Frontend gọi vào
    environment:
      - ENV=development
    depends_on:
      - identity-service
    networks:
      - erp_network

  identity-service:
    build:
      context: ./apps/Middleware/identity
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-identity
    restart: unless-stopped
    environment:
      - ENV=development
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=identity_db
    depends_on:
      - postgres-db
    networks:
      - erp_network

  # ---------------------------------------------------------
  # 2. BACKEND GO (GIN)
  # ---------------------------------------------------------
  inventory-service:
    build:
      context: ./apps/backend/services-Go/inventory
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-inventory
    restart: unless-stopped
    environment:
      - ENV=development
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=inventory_db
    depends_on:
      - postgres-db
    networks:
      - erp_network

  purchasing-service:
    build:
      context: ./apps/backend/services-Go/purchasing
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-purchasing
    restart: unless-stopped
    environment:
      - ENV=development
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=purchasing_db
    depends_on:
      - postgres-db
    networks:
      - erp_network

  sales-service:
    build:
      context: ./apps/backend/services-Go/sales
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-sales
    restart: unless-stopped
    environment:
      - ENV=development
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=sales_db
    depends_on:
      - postgres-db
    networks:
      - erp_network

  # ---------------------------------------------------------
  # 3. BACKEND JAVA (SPRING BOOT)
  # ---------------------------------------------------------
  crm-service:
    build:
      context: ./apps/backend/services-Java/crm
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-crm
    restart: unless-stopped
    environment:
      - ENV=development
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=crm_db
      - REDIS_HOST=redis-cache # CRM sử dụng Redis cache
      - REDIS_PORT=6379
    depends_on:
      - postgres-db
      - redis-cache
    networks:
      - erp_network

  finance-service:
    build:
      context: ./apps/backend/services-Java/finance
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-finance
    restart: unless-stopped
    environment:
      - ENV=development
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=finance_db
    depends_on:
      - postgres-db
    networks:
      - erp_network

  hrm-service:
    build:
      context: ./apps/backend/services-Java/hrm
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-hrm
    restart: unless-stopped
    environment:
      - ENV=development
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=hrm_db
    depends_on:
      - postgres-db
    networks:
      - erp_network

  # ---------------------------------------------------------
  # 4. AI SERVICES (PYTHON FASTAPI)
  # ---------------------------------------------------------

  ai-orchestrator:
    build:
      context: ./apps/AI/Orchestrator
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-ai-orchestrator
    restart: unless-stopped
    environment:
      - ENV=development
      # Kết nối Postgres (Lưu State/LangGraph)
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=ai_orchestrator_db
      # Kết nối Redis (Cache & Token)
      - REDIS_HOST=redis-cache
      - REDIS_PORT=6379
      # Kết nối MongoDB (Reasoning Logs)
      - MONGO_HOST=mongodb-service
      - MONGO_PORT=27017
      - MONGO_DB=ai_logs_db
    depends_on:
      - postgres-db
      - redis-cache
      - mongodb-service
    networks:
      - erp_network

  ai-multimodal-engine:
    build:
      context: ./apps/AI/MultimodalEngine
      dockerfile: Dockerfile
      args:
        # Chạy Local dùng image thuần
        BASE_IMAGE: python:3.13.6-slim-bullseye 
    profiles: ["fullstack"]
    container_name: erp-ai-multimodal-engine
    restart: unless-stopped
    environment:
      - ENV=development
      # Kết nối Postgres có pgvector
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=ai_vector_db
    depends_on:
      - postgres-db
    networks:
      - erp_network
  ai-facial-recognition:
    build:
      context: ./apps/AI/FacialRecognition
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-ai-facial-recognition
    restart: unless-stopped
    environment:
      - ENV=development
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=facial_recognition_db
    networks:
      - erp_network

  # ---------------------------------------------------------
  # 5. FRONTEND (NEXT.JS)
  # ---------------------------------------------------------
  frontend:
    build:
      context: ./apps/frontend/erp-ars-neonci
      dockerfile: Dockerfile
    profiles: ["fullstack"]
    container_name: erp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000" # PUBLIC: Cổng Frontend UI
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080 # Trỏ về Gateway ở local
    depends_on:
      - api-gateway
    networks:
      - erp_network