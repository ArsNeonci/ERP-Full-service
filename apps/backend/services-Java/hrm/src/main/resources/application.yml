spring:
  application:
    name: crm-service
  
  # Cấu hình nạp biến môi trường từ file .env ở thư mục gốc
  config:
    import: optional:file:.env

  # 1. Cấu hình Postgres 
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crm_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10} 
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  # 2. Cấu hình Hibernate / JPA
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate 
    show-sql: false 

  # 3. Cấu hình Flyway Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# (Tùy chọn) Chuyển port chạy local để không đụng cổng 8080 của Gateway
server:
  port: 8087